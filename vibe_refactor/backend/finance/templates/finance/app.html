{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cashmoney</title>
    {% for css_file in react_entry_css %}
        <link rel="stylesheet" href="{% static 'finance/react/'|add:css_file %}">
    {% endfor %}
</head>
<body>
    <div id="root">
        {% if not react_entry_js %}
            <div style="font-family: system-ui, sans-serif; padding: 24px;">
                React frontend has not been built yet. Run <code>vibe_refactor\npm.bat install</code>
                and <code>vibe_refactor\npm.bat run build</code> from <code>vibe_refactor\frontend</code>.
            </div>
        {% endif %}
    </div>
    {% if react_entry_js %}
        <script type="module" src="{% static 'finance/react/'|add:react_entry_js %}"></script>
    {% endif %}
</body>
</html>
