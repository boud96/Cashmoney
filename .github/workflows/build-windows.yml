name: Build Windows App

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    env:
      VITE_CASHMONEY_DONATION_URL: ${{ vars.VITE_CASHMONEY_DONATION_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Build packaged app
        shell: cmd
        run: build_packaged_app.bat

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $dist = "desktop/dist"
          $artifactRoot = "artifacts"
          $setupDir = Join-Path $artifactRoot "setup"
          $portableDir = Join-Path $artifactRoot "portable"
          $unpackedDir = Join-Path $artifactRoot "win-unpacked"
          $releaseDir = Join-Path $artifactRoot "release"

          New-Item -ItemType Directory -Force -Path $setupDir, $portableDir, $unpackedDir, $releaseDir | Out-Null

          $setup = Get-ChildItem -Path $dist -Filter "Cashmoney Setup *.exe" | Select-Object -First 1
          if ($null -eq $setup) {
            throw "Setup installer was not found in $dist."
          }
          Copy-Item -LiteralPath $setup.FullName -Destination $setupDir
          Copy-Item -LiteralPath $setup.FullName -Destination (Join-Path $releaseDir "Cashmoney-Setup.exe")

          $portable = Get-ChildItem -Path $dist -Filter "Cashmoney *.exe" |
            Where-Object { $_.Name -notlike "Cashmoney Setup *" } |
            Select-Object -First 1
          if ($null -eq $portable) {
            throw "Portable executable was not found in $dist."
          }
          Copy-Item -LiteralPath $portable.FullName -Destination $portableDir
          Copy-Item -LiteralPath $portable.FullName -Destination (Join-Path $releaseDir "Cashmoney-Portable.exe")

          Get-FileHash (Join-Path $releaseDir "Cashmoney-Setup.exe"), (Join-Path $releaseDir "Cashmoney-Portable.exe") |
            ForEach-Object { "$($_.Hash)  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Path (Join-Path $releaseDir "checksums.txt") -Encoding ascii

          if (!(Test-Path -LiteralPath "$dist/win-unpacked")) {
            throw "Unpacked app folder was not found in $dist."
          }
          Copy-Item -LiteralPath "$dist/win-unpacked" -Destination $unpackedDir -Recurse

      - name: Upload setup installer
        uses: actions/upload-artifact@v7
        with:
          name: cashmoney-setup-exe
          path: artifacts/setup/**
          if-no-files-found: error

      - name: Upload portable executable
        uses: actions/upload-artifact@v7
        with:
          name: cashmoney-portable-exe
          path: artifacts/portable/**
          if-no-files-found: error

      - name: Upload unpacked Windows app
        uses: actions/upload-artifact@v7
        with:
          name: cashmoney-win-unpacked
          path: artifacts/win-unpacked/**
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $assets = @(
            "artifacts/release/Cashmoney-Setup.exe",
            "artifacts/release/Cashmoney-Portable.exe",
            "artifacts/release/checksums.txt"
          )
          if (gh release view $env:GITHUB_REF_NAME *> $null) {
            gh release upload $env:GITHUB_REF_NAME @assets --clobber
          } else {
            gh release create $env:GITHUB_REF_NAME @assets --title "Cashmoney $env:GITHUB_REF_NAME" --generate-notes
          }
